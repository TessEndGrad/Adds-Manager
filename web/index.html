<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yandex Direct — Кабинет</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">

  <!-- Шапка -->
  <header class="header">
    <div class="px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <div class="flex items-center gap-2">
          <img src="pictures/monkey.jpg" class="w-8 h-8 bg-green-400 rounded flex items-center justify-center text-black font-bold text-xl"></img>
          <span class="text-xl font-semibold text-gray-900">Porno</span>
        </div>

        <div class="relative w-96">
          <input type="text" id="searchInput" 
                 placeholder="Поиск кампаний..." 
                 class="w-full bg-gray-100 border border-gray-300 rounded-lg pl-10 py-2 text-sm focus:outline-none focus:border-yellow-400">
          <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <button onclick="renderNewPost()" 
                class="bg-green-400 hover:bg-[rgb(0, 255, 150)] text-black font-medium px-6 py-2.5 rounded-lg flex items-center gap-2 transition">
          <i class="fas fa-plus"></i>
          <span>Создать кампанию</span>
        </button>

        <button onclick="logout()" 
                class="btn-secondary">
          <span>Выход</span>
        </button>

        <div class="flex items-center gap-3">
          <div class="text-right">
            <div class="text-sm font-medium" id="name">Иван Иванов</div>
          </div>
          <div class="w-9 h-9 bg-gray-300 rounded-full flex items-center justify-center text-lg cursor-pointer">👤</div>
        </div>
      </div>
    </div>
  </header>

  <div class="flex h-[calc(100vh-57px)]">

    <!-- Левое меню -->
    <aside class="sidebar w-64 bg-white border-r border-gray-200 flex flex-col" id="sidebarMenu">
      <nav class="flex-1 overflow-y-auto py-4">
        <ul class="space-y-1 px-3">
          <li><a href="#" class="menu-item active" data-section="overview"><i class="fas fa-home w-5"></i> Обзор</a></li>
          <li><a href="#" class="menu-item" data-section="campaigns"><i class="fas fa-bullhorn w-5"></i> Кампании</a></li>
          <li><a href="#" class="menu-item"><i class="fas fa-layer-group w-5"></i> Группы объявлений</a></li>
          <li><a href="#" class="menu-item"><i class="fas fa-file-alt w-5"></i> Объявления</a></li>
          <li><a href="#" class="menu-item"><i class="fas fa-key w-5"></i> Ключевые фразы</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Основная область -->
    <main class="flex-1 flex overflow-hidden">

      <!-- Список кампаний -->
      <div class="w-2/4 bg-white border-r border-gray-200 overflow-y-auto" id="campaignList">
        <div class="p-6 border-b bg-gray-50">
          <h1 class="text-2xl font-semibold text-gray-900" id="rec_header">Рекламные Кампании</h1>
          <!-- <p class="text-gray-600 text-sm mt-1">Всего: <span id="campaignCount">8</span></p> -->
        </div>

        <div class="divide-y" id="mainContent">
          <!-- Кампании будут добавлены через JavaScript -->
        </div>
      </div>

      <!-- Правая панель (детали кампании) -->
      <div class="flex-1 bg-gray-50 overflow-y-auto transition-all duration-300" id="detailPanel">
        <div class="h-full flex items-center justify-center text-gray-400" id="emptyState">
          <div class="text-center">
            <i class="fas fa-arrow-left text-4xl mb-4"></i>
            <p class="text-lg">Выберите кампанию слева</p>
          </div>
        </div>

        <div id="campaignDetail" class="hidden p-8">
          <!-- Детали кампании будут загружаться сюда -->
        </div>
      </div>
    </main>
  </div>
  <!-- Модальное окно -->
    <div id="card-modal" class="modal">
        <div class="modal-content">
            <div id="modal-body"></div>
            <div class="modal-footer">
                <button onclick="closeModal()" class="btn-trirdary">Закрыть</button>
                <!-- <button onclick="addCurrentToDeckFromModal()" class="btn-primary">Добавить в колоду</button> -->
            </div>
        </div>
    </div>
  <script src="js/script.js"></script>
</body>
</html>
